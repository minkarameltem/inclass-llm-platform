<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Panel</title>
  <style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  padding: 40px;
}
.box {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
input, textarea, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  box-sizing: border-box;
}
input, textarea {
  border-radius: 8px;
  border: 1px solid #ddd;
}
button {
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button:hover {
  background: #5a67d8;
}
pre {
  background: #111827;
  color: #e5e7eb;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>
<body>
<div class="box">
  <h1>Student Panel</h1>

  <input id="email" value="test@test.com" placeholder="Email">
  <input id="password" value="1234" placeholder="Password">
  <input id="course_id" value="SE101" placeholder="Course ID">
  <input id="activity_no" value="3" placeholder="Activity No">

  <button onclick="getActivity()">Activity Getir</button>

  <input id="score" value="85" placeholder="Score">
  <textarea id="meta">demo test</textarea>

  <button onclick="submitScore()">Score Gönder</button>

  <h2>Backend Response</h2>
  <pre id="output">Henüz istek gönderilmedi.</pre>
</div>

<script>
const API = "http://127.0.0.1:8000";

async function getActivity() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const course_id = document.getElementById("course_id").value;
    const activity_no = document.getElementById("activity_no").value;

    const response = await fetch(`${API}/student/get-activity?email=${email}&password=${password}&course_id=${course_id}&activity_no=${activity_no}`, {
      method: "POST"
    });

    const data = await response.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
  } catch (error) {
    document.getElementById("output").innerText = "ERROR: " + error;
  }
}

async function submitScore() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const course_id = document.getElementById("course_id").value;
    const activity_no = document.getElementById("activity_no").value;
    const score = document.getElementById("score").value;
    const meta = encodeURIComponent(document.getElementById("meta").value);

    const response = await fetch(`${API}/student/log-score?email=${email}&password=${password}&course_id=${course_id}&activity_no=${activity_no}&score=${score}&meta=${meta}`, {
      method: "POST"
    });

    const data = await response.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
  } catch (error) {
    document.getElementById("output").innerText = "ERROR: " + error;
  }
}
</script>
</body>
</html>
