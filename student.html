<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Student Panel</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:30px}
.box{max-width:520px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input{width:100%;padding:10px;margin:6px 0 14px}
button{width:100%;padding:10px;border:0;background:#2563eb;color:#fff;border-radius:6px}
pre{background:#eee;padding:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="box">
<h2>Student Panel</h2>

<input id="email" value="test@test.com">
<input id="password" value="1234">
<input id="course" value="SE101">
<input id="activity" value="3">

<button onclick="getActivity()">Activity Getir</button>

<pre id="out"></pre>
</div>

<script>
const API="http://127.0.0.1:8000";

function getActivity(){
  fetch(`${API}/student/get-activity?email=${email.value}&password=${password.value}&course_id=${course.value}&activity_no=${activity.value}`,{method:"POST"})
  .then(r=>r.json())
  .then(j=> out.textContent=JSON.stringify(j,null,2))
  .catch(e=> out.textContent="ERROR: "+e);
}
</script>

</body>
</html>
