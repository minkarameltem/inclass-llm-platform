<!DOCTYPE html>
<html>
<head>
  <title>Instructor Panel</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .section { margin-bottom: 30px; }
    input, button { margin: 5px; padding: 8px; }
  </style>
</head>
<body>

<h1>Instructor Panel</h1>

<div class="section">
  <h2>Login</h2>
  <input placeholder="Email">
  <input placeholder="Password" type="password">
  <button>Login</button>
</div>

<div class="section">
  <h2>Courses</h2>
  <button onclick="loadCourses()">Load Courses</button>
  <ul id="courses"></ul>
</div>

<div class="section">
  <h2>Create Activity</h2>
  <input id="activityName" placeholder="Activity name">
  <button onclick="createActivity()">Create</button>
</div>

<div class="section">
  <h2>Scores</h2>
  <button onclick="loadScores()">Load Scores</button>
  <div id="scores"></div>
</div>

<script>
function loadCourses() {
  fetch("/courses")
    .then(res => res.json())
    .then(data => {
      document.getElementById("courses").innerHTML =
        data.map(c => "<li>" + c.name + "</li>").join("");
    });
}

function createActivity() {
  fetch("/activities", {
    method: "POST",
    body: JSON.stringify({ name: document.getElementById("activityName").value })
  });
}

function loadScores() {
  fetch("/scores")
    .then(res => res.json())
    .then(data => {
      document.getElementById("scores").innerText = JSON.stringify(data);
    });
}
</script>

</body>
</html>
